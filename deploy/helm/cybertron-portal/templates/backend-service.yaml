{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cybertron-portal.backend.fullname" . }}
  labels:
    app.kubernetes.io/component: backend
    {{- include "cybertron-portal.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: backend
    {{- include "cybertron-portal.selectorLabels" . | nindent 4 }}
{{- end }}
