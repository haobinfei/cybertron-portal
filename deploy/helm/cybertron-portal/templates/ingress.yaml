{{- if .Values.ingress.enabled }}
{{- $fullName := include "cybertron-portal.fullname" . -}}
{{- $backendName := include "cybertron-portal.backend.fullname" . -}}
{{- $frontendName := include "cybertron-portal.frontend.fullname" . -}}
{{- $certManager := .Values.ingress.certManager -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "cybertron-portal.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and $certManager.enabled $certManager.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $certManager.clusterIssuer }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if or .Values.ingress.tls $certManager.enabled }}
  tls:
    {{- if $certManager.enabled }}
    - hosts:
        {{- range .Values.ingress.hosts }}
        - {{ .host | quote }}
        {{- end }}
      secretName: {{ $certManager.secretName | default (printf "%s-tls" $fullName) }}
    {{- else }}
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .service "backend" }}{{ $backendName }}{{ else }}{{ $frontendName }}{{ end }}
                port:
                  number: {{ .port }}
          {{- end }}
    {{- end }}
{{- end }}
