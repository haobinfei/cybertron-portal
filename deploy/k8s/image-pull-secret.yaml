# deploy/k8s/image-pull-secret.yaml
# 用于在 Kubernetes 中创建拉取私有镜像的 Secret
#
# 使用方式（请替换为真实账号密码，或通过 CI 自动生成）：
#   kubectl create secret docker-registry aliyun-registry-secret \
#     --docker-server=registry.cn-hangzhou.aliyuncs.com \
#     --docker-username=17853309409 \
#     --docker-password='Wly5211314.,' \
#     --namespace=default \
#     --dry-run=client -o yaml > deploy/k8s/image-pull-secret.yaml
#   kubectl apply -f deploy/k8s/image-pull-secret.yaml
#
# 在 Pod/Deployment 中引用：
#   imagePullSecrets:
#     - name: aliyun-registry-secret
apiVersion: v1
kind: Secret
metadata:
  name: aliyun-registry-secret
  namespace: default
type: kubernetes.io/dockerconfigjson
# data 字段需填入 base64 编码后的 ~/.docker/config.json
# 示例占位符，请使用真实值替换
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>
