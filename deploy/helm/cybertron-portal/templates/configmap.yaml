{{- if .Values.backend.config.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cybertron-portal.backend.fullname" . }}-config
  labels:
    {{- include "cybertron-portal.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      port: {{ .Values.backend.service.port }}
    database:
      host: "{{ .Values.backend.database.host }}"
      port: {{ .Values.backend.database.port }}
      user: "{{ .Values.backend.database.user }}"
      password: "{{ .Values.backend.database.password }}"
      dbname: "{{ .Values.backend.database.dbname }}"
      sslmode: "{{ .Values.backend.database.sslmode }}"
    redis:
      addr: "{{ .Values.backend.redis.addr }}"
      password: "{{ .Values.backend.redis.password }}"
      db: {{ .Values.backend.redis.db }}
    jwt:
      secret: "{{ .Values.backend.jwt.secret }}"
      expire_hours: {{ .Values.backend.jwt.expireHours }}
{{- end }}
